<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal MCP Client</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        background: #0f1117;
        color: #e1e4e8;
        min-height: 100vh;
      }

      /* ── Layout ── */
      .app {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      header {
        padding: 14px 24px;
        background: #161b22;
        border-bottom: 1px solid #30363d;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      header h1 { margin: 0; font-size: 16px; font-weight: 600; color: #f0f6fc; }
      header p  { margin: 0; color: #8b949e; font-size: 12px; }

      .main {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 0;
        height: calc(100vh - 53px);
      }

      /* ── Sidebar ── */
      .sidebar {
        border-right: 1px solid #30363d;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      /* ── Log ── */
      .log-panel {
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0;
        background: #0d1117;
      }

      /* ── Cards ── */
      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 14px;
      }
      .card-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: #8b949e;
        margin: 0 0 10px;
      }

      /* ── Status badge ── */
      .status-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: .04em;
      }
      .status-disconnected { background: #3d1c1c; color: #f97583; }
      .status-connecting   { background: #2d2a1c; color: #f0c000; }
      .status-connected    { background: #1c3a1c; color: #56d364; }

      /* ── Forms ── */
      label    { display: block; margin-bottom: 4px; font-size: 11px; color: #8b949e; }
      input[type=text], input[type=url] {
        width: 100%;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e1e4e8;
        padding: 6px 10px;
        font-size: 13px;
        outline: none;
        transition: border-color .15s;
      }
      input[type=text]:focus, input[type=url]:focus { border-color: #388bfd; }

      .field { margin-bottom: 8px; }

      /* ── Buttons ── */
      .btn {
        padding: 6px 14px;
        border: 1px solid transparent;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity .15s;
      }
      .btn:disabled { opacity: .4; cursor: default; }
      .btn-primary  { background: #238636; border-color: #2ea043; color: #fff; }
      .btn-primary:not(:disabled):hover { background: #2ea043; }
      .btn-default  { background: #21262d; border-color: #30363d; color: #c9d1d9; }
      .btn-default:not(:disabled):hover { background: #30363d; }
      .btn-danger   { background: #6e1c1c; border-color: #b91c1c; color: #fca5a5; }
      .btn-danger:not(:disabled):hover { background: #b91c1c; }
      .btn-sm       { padding: 3px 8px; font-size: 12px; }
      .btn-row      { display: flex; gap: 8px; }

      /* ── Roots list ── */
      #roots-list {
        list-style: none;
        margin: 8px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .root-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 6px 10px;
        gap: 8px;
      }
      .root-uri {
        font-family: 'SFMono-Regular', Consolas, monospace;
        font-size: 11px;
        color: #79c0ff;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .root-empty { color: #484f58; font-size: 12px; padding: 4px 0; }

      /* ── Server info ── */
      #server-info { font-size: 12px; color: #c9d1d9; min-height: 20px; }
      #server-info strong { color: #79c0ff; }
      #server-info small  { color: #8b949e; }

      /* ── Log entries ── */
      #log { display: flex; flex-direction: column; gap: 2px; }
      .log-entry {
        font-family: 'SFMono-Regular', Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
        padding: 3px 6px;
        border-radius: 4px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .log-info    { color: #8b949e; }
      .log-success { color: #56d364; }
      .log-warn    { color: #e3b341; }
      .log-error   { color: #f85149; background: #2d1414; }

      /* ── Divider ── */
      hr { border: none; border-top: 1px solid #30363d; margin: 4px 0; }

      @media (max-width: 700px) {
        .main { grid-template-columns: 1fr; }
        .sidebar { border-right: none; border-bottom: 1px solid #30363d; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div>
          <h1>Minimal MCP Client</h1>
          <p>Spec 2025-11-25 · Roots capability · Streamable HTTP transport</p>
        </div>
        <span id="status-badge" class="status-badge status-disconnected">Disconnected</span>
      </header>

      <div class="main">
        <!-- ── Sidebar ── -->
        <aside class="sidebar">

          <!-- Connection -->
          <div class="card">
            <p class="card-title">Server Connection</p>
            <div class="field">
              <label for="endpoint">MCP Endpoint URL</label>
              <input id="endpoint" type="url" placeholder="http://localhost:8080/mcp" />
            </div>
            <div class="btn-row">
              <button id="btn-connect" class="btn btn-primary">Connect</button>
              <button id="btn-disconnect" class="btn btn-default">Disconnect</button>
            </div>
          </div>

          <!-- Server info -->
          <div class="card">
            <p class="card-title">Server Info</p>
            <div id="server-info">—</div>
          </div>

          <!-- Roots -->
          <div class="card">
            <p class="card-title">Roots</p>
            <div class="field">
              <label for="root-uri">URI <small>(must be file://)</small></label>
              <input id="root-uri" type="text" placeholder="file:///home/user/project" />
            </div>
            <div class="field">
              <label for="root-name">Name <small>(optional)</small></label>
              <input id="root-name" type="text" placeholder="My Project" />
            </div>
            <button id="btn-add-root" class="btn btn-primary">Add Root</button>
            <ul id="roots-list"></ul>
          </div>

          <!-- Ad-hoc request -->
          <div class="card">
            <p class="card-title">Send Request</p>
            <div class="field">
              <label for="req-method">Method</label>
              <input id="req-method" type="text" placeholder="tools/list" />
            </div>
            <div class="field">
              <label for="req-params">Params <small>(JSON, optional)</small></label>
              <input id="req-params" type="text" placeholder='{"cursor": null}' />
            </div>
            <button id="btn-send-req" class="btn btn-default">Send</button>
          </div>

        </aside>

        <!-- ── Activity log ── -->
        <section class="log-panel">
          <div id="log"></div>
        </section>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
